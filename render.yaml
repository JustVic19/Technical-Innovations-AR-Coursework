services:
  - type: web
    name: sentinel-ar
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run server
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DB_PATH
        value: /opt/render/project/src/data/sentinel.db
    disk:
      name: sqlite-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
